name: law
description: "UYAP Avukat Takvim Asistanı"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management & DI
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # WebView (UYAP/e-Devlet oturumu)
  flutter_inappwebview: ^6.1.5

  # Yerel DB (SQLCipher şifreli)
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlcipher_flutter_libs: ^0.6.4
  path_provider: ^2.1.5
  path: ^1.9.1

  # HTTP / parse
  dio: ^5.7.0
  html: ^0.15.5
  xml: ^6.5.0

  # Native takvim ve bildirim
  device_calendar: ^4.3.3
  flutter_local_notifications: ^18.0.1
  permission_handler: ^11.3.1

  # Secure storage (Keychain/Keystore)
  flutter_secure_storage: ^9.2.2

  # Tarih/saat
  intl: ^0.20.2
  timezone: ^0.9.4

  # Yardımcılar
  logger: ^2.5.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  collection: ^1.19.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  drift_dev: ^2.22.1
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.3

  # Linting
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

  # Test
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true   # for ARB-based localization

  assets:
    - assets/i18n/
